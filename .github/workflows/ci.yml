name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Check formatting
        run: npm run format

      # The individual linters run separately from `npm run lint` so a failure
      # names the tool that failed instead of the whole chain.
      - name: Lint JS/TS
        run: npm run lint:eslint

      - name: Lint CSS
        run: npm run lint:stylelint

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Production build
        run: npm run build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Run tests
        run: npm run test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 30

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      # Chromium alone: this suite guards the app shell's stacking order, not
      # cross-browser rendering. `--with-deps` because a bare runner is
      # missing the shared libraries the browser needs.
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser smoke tests
        run: npm run test:e2e

      # Only when something failed: a passing run's report says nothing that
      # the log does not.
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
