name: Deploy to GitHub Pages

# Manual only. Merging to main publishes nothing on its own — a deploy is a
# deliberate act, and this app is verified on a phone before it goes out.
on:
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      # `base` is "/" (vite.config.ts) — the site is served from the apex
      # custom domain root. public/CNAME rides along into dist/, so every
      # deploy re-pins big-zoomies.com as the Pages custom domain.
      - name: Build app
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
